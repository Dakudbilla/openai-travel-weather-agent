<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel & Weather Guide</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>"
    />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>🌍 Travel &amp; Weather Guide</h1>
        <p class="tagline">
          Enter any city and get a quick rundown — background, live weather, seasonal
          activities, and whether now's a good time to visit.
        </p>
      </header>

      <form id="search-form" class="search">
        <input
          id="city-input"
          class="search__input"
          type="text"
          placeholder="e.g. Lisbon, Kyoto, Cape Town…"
          autocomplete="off"
          required
        />
        <button id="search-button" class="search__button" type="submit">Go</button>
      </form>

      <section id="result" class="result" aria-live="polite"></section>
    </main>

    <footer class="footer">
      Powered by the OpenAI Agents SDK &amp; Open-Meteo
    </footer>

    <script src="app.js"></script>
  </body>
</html>
